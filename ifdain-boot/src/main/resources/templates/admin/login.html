<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #212529;
            height: 100vh;
            display: flex;
            align-items: center;
        }
        .form-signin {
            width: 100%;
            max-width: 380px;
            padding: 15px;
            margin: 0 auto;
        }
        .form-signin .form-floating:focus-within {
            z-index: 2;
        }
    </style>
</head>
<body>
<div class="form-signin">
    <form method="post" th:action="@{${basePath} + '/login'}">
        <input type="hidden" th:name="${_csrf?.parameterName}" th:value="${_csrf?.token}"/>
        <div class="text-center mb-4">
            <i class="bi bi-lightning-fill" style="font-size: 2.5rem; color: #0d6efd;"></i>
            <h1 class="h3 mt-2 text-white">Ifdain 管理后台</h1>
        </div>

        <!-- 错误提示 -->
        <div th:if="${param.error}" class="alert alert-danger py-2 small">
            <i class="bi bi-exclamation-triangle"></i> 用户名或密码错误
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2 small">
            <i class="bi bi-info-circle"></i> 已成功退出登录
        </div>

        <div class="form-floating mb-2">
            <input type="text" name="username" class="form-control" id="username" placeholder="用户名" autofocus>
            <label for="username">用户名</label>
        </div>
        <div class="form-floating mb-3">
            <input type="password" name="password" class="form-control" id="password" placeholder="密码">
            <label for="password">密码</label>
        </div>
        <button class="w-100 btn btn-lg btn-primary" type="submit">登录</button>
    </form>
</div>
</body>
</html>
