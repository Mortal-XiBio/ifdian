<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN"
      th:fragment="layout (content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: '管理后台'">管理后台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { font-size: .875rem; background: #f5f5f5; min-height: 100vh; }
        .app-wrapper { display: flex; height: 100vh; align-items: flex-start; }
        .sidebar {
            width: 220px; min-width: 220px;
            background: #1e293b; color: #cbd5e1;
            display: flex; flex-direction: column;
            padding: 0;
            position: sticky; top: 0; height: 100vh; overflow-y: auto;
        }
        .sidebar-brand {
            display: flex; align-items: center; gap: .5rem;
            padding: 1rem 1.25rem; font-size: 1.1rem; font-weight: 700;
            color: #fff; text-decoration: none;
            border-bottom: 1px solid rgba(255,255,255,.08);
        }
        .sidebar-brand:hover { color: #fff; }
        .sidebar-nav { flex: 1; padding: .75rem 0; list-style: none; margin: 0; }
        .sidebar-nav .nav-item { }
        .sidebar-nav .nav-link {
            display: flex; align-items: center; gap: .5rem;
            padding: .55rem 1.25rem; color: #94a3b8; text-decoration: none;
            font-size: .875rem; font-weight: 500;
            transition: all .15s;
        }
        .sidebar-nav .nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,.05); }
        .sidebar-nav .nav-link.active { color: #fff; background: rgba(255,255,255,.1); }
        .sidebar-nav .nav-link .bi { font-size: 1rem; }
        .sidebar-footer {
            padding: .75rem 1.25rem; border-top: 1px solid rgba(255,255,255,.08);
        }
        .sidebar-footer .nav-link { color: #94a3b8; font-size: .8rem; padding: .25rem 0; }
        .sidebar-footer .nav-link:hover { color: #ef4444; }
        .main-content { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100%; }
        .main-header {
            background: #fff; border-bottom: 1px solid #e5e7eb;
            padding: .75rem 1.5rem; font-size: .85rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .main-header .user-info { color: #64748b; }
        .main-body { flex: 1; padding: 1.5rem; overflow-y: auto; }
        .main-footer {
            text-align: center; color: #94a3b8; font-size: .75rem;
            padding: .75rem; border-top: 1px solid #e5e7eb;
        }
        .card-stat { border-left: 4px solid; }
        .card-stat.primary { border-left-color: #0d6efd; }
        .card-stat.success { border-left-color: #198754; }
        .card-stat.warning { border-left-color: #f59e0b; }
        .card-stat.info { border-left-color: #0ea5e9; }
        .text-mono { font-family: SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: .8rem; word-break: break-all; }
        @media (max-width: 768px) {
            .app-wrapper { flex-direction: column; }
            .sidebar { width: 100%; min-width: 100%; flex-direction: row; flex-wrap: wrap; padding: .5rem; position: static; height: auto; overflow-y: visible; }
            .sidebar-brand { border-bottom: none; padding: .5rem; }
            .sidebar-nav { display: flex; flex-direction: row; gap: .25rem; padding: 0; }
            .sidebar-nav .nav-link { padding: .4rem .75rem; border-radius: 6px; }
            .sidebar-footer { display: none; }
            .main-body { padding: .75rem; }
        }
        @media (min-width: 769px) and (max-width: 991px) {
            .main-body { padding: 1rem; }
        }
        /* 为 API 工具页面的固定定位右栏预留空间 */
        @media (min-width: 992px) {
            .main-body { padding-right: 1rem; }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <!-- 侧边栏 -->
    <nav class="sidebar">
        <a th:href="@{${basePath}}" class="sidebar-brand">
            <i class="bi bi-lightning-fill"></i> Ifdain
        </a>
        <ul class="sidebar-nav">
            <li class="nav-item">
                <a th:href="@{${basePath}}" class="nav-link"
                   th:classappend="${#httpServletRequest.requestURI == basePath or #httpServletRequest.requestURI == basePath + '/'} ? 'active' : ''">
                    <i class="bi bi-speedometer2"></i> 仪表盘
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{${basePath} + '/orders'}" class="nav-link"
                   th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, basePath + '/orders')} ? 'active' : ''">
                    <i class="bi bi-receipt"></i> 订单管理
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{${basePath} + '/plans'}" class="nav-link"
                   th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, basePath + '/plans')} ? 'active' : ''">
                    <i class="bi bi-box-seam"></i> 方案管理
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{${basePath} + '/tools'}" class="nav-link"
                   th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, basePath + '/tools')} ? 'active' : ''">
                    <i class="bi bi-tools"></i> API 工具
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{${basePath} + '/settings'}" class="nav-link"
                   th:classappend="${#strings.startsWith(#httpServletRequest.requestURI, basePath + '/settings')} ? 'active' : ''">
                    <i class="bi bi-gear"></i> 系统设置
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <a th:href="@{${basePath} + '/logout'}" class="nav-link">
                <i class="bi bi-box-arrow-right"></i> 退出登录
            </a>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="main-body">
            <div th:replace="${content}">content</div>
        </div>
        <div class="main-footer">Ifdain v2.1.1.0beta &middot; &copy; MortalT工作室 &middot; <span id="_fe"></span></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
(function(){var el=document.getElementById('_fe');if(!el)return;var addr=/*[[${footerEmail}]]*/'';el.innerHTML='<a href="mai'+'lto:'+addr+'" style="color:inherit;text-decoration:none">'+addr+'</a>';})();
</script>
</body>
</html>
