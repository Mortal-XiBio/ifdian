# ============================================================
# 爱发电支付集成 — 默认配置 (embedded 模式)
# ============================================================
# 运行方式:
#   embedded  (默认) → H2 内存库，开箱即用，适合嵌入宿主项目
#   standalone       → MySQL 数据库，需先导入 sql/schema.sql
# ============================================================

server:
  port: 8888

ifdain:
  user-id: your_user_id_here
  api-token: your_api_token_here
  webhook-path: /webhook/ifdian
  enable-webhook-signature: true
  api-base-url: https://ifdian.net
  admin:
    base-path: /admin
  # 回调配置
  callback-max-retries: 3
  callback-timeout-ms: 10000
  # Redis 缓存配置 (默认关闭)
  redis-enabled: false
  redis-host: localhost
  redis-port: 6379
  redis-password:
  redis-database: 0

spring:
  datasource:
    url: jdbc:h2:mem:ifdain;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console

---
# ============================================================
# standalone 模式 (MySQL)
# 激活: --spring.profiles.active=standalone
# 前置: 先执行 sql/schema.sql 建表
# ============================================================
spring:
  config:
    activate:
      on-profile: standalone
  datasource:
    url: jdbc:mysql://localhost:3306/ifdain?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: root
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false

ifdain:
  admin:
    base-path: /admin
  # 回调配置
  callback-max-retries: 3
  callback-timeout-ms: 10000
  # Redis 缓存配置 (默认关闭)
  redis-enabled: false
  redis-host: localhost
  redis-port: 6379
  redis-password:
  redis-database: 0
