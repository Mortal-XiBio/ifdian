# ============================================================
# Ifdain — Nginx 反向代理 + SSL 配置
# ============================================================
# 使用方式:
#   1. 将本文件 include 到 nginx.conf 的 http 块中，或复制 server 块
#   2. 修改 server_name 为你的域名
#   3. 配置 SSL 证书路径
#   4. nginx -t && nginx -s reload
# ============================================================

# ---------- HTTP → HTTPS 重定向 ----------
server {
    listen 80;
    server_name your-domain.com;

    # ACME 验证 (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS 主站 ----------
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    # ===== SSL 证书 =====
    # 方式一: Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # 方式二: 自购证书
    # ssl_certificate     /etc/nginx/ssl/your-domain.crt;
    # ssl_certificate_key /etc/nginx/ssl/your-domain.key;

    # ===== SSL 安全配置 =====
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (取消注释前确认 SSL 配置正确)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # ===== 安全头 =====
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ===== 日志 =====
    access_log /var/log/nginx/ifdain-access.log;
    error_log  /var/log/nginx/ifdain-error.log;

    # 上传限制 (根据需要调整)
    client_max_body_size 10m;

    # ===== 反向代理到 Spring Boot =====
    location / {
        proxy_pass http://127.0.0.1:8888;

        # 传递原始请求信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket 支持 (如需)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 缓冲设置
        proxy_buffering off;
    }

    # ===== 静态资源缓存 (如果 Spring Boot 直接提供) =====
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ===== 爱发电 Webhook (允许来自爱发电的回调) =====
    # Webhook 不需要额外配置，反向代理会自动转发到 /webhook/ifdian
}
